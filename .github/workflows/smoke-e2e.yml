name: smoke-e2e

on:
  pull_request:
  push:
    branches:
      - main
      - 'proposal/**'
  workflow_dispatch:

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check --no-write-lock-file
