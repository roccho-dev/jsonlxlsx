name: XLSX dispatch

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Target ref to checkout
        required: true
        default: main

permissions:
  contents: read

jobs:
  xlsx:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - run: npm run check
      - run: npm test
      - run: node scripts/ci-generate-xlsx.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: jsonlxlsx-minimal-xlsx
          path: |
            dist/examples/minimal/output.xlsx
            dist/examples/minimal/summary.json
          if-no-files-found: error
